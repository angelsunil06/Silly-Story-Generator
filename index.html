<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whimsical Story Generator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Silly Story Generator</h1>
    <p class="subtitle">Generate a random story your own.</p>

    <label for="customname">Enter a name</label>
    <input type="text" id="customname" placeholder="Type a name" />

    <button class="randomize">Generate Story</button>

    <p class="story">Your story will appear here...</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
